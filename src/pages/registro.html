    <main class="container">
        <h1 class="mt-5 animate__animated animate__fadeInLeft"">Crear una cuenta</h1>
        <hr class="border-2">

        <div class="row mt-5">
            <div class="col-lg-8 offset-lg-2 col-md-8 offset-md-2 col-sm-10 offset-sm-1">
                <div class="card shadow border-0 rounded-2">
                    <div class="card-body">

                        <div class="row">

                            <div class="col-lg-12">
                                <div class="mb-3">
                                    <label class="form-label">Nombre Completo</label>
                                    <input type="text" class="form-control" id="registro_input_nombre"
                                        placeholder="Ingrese su nombre">
                                </div>

                            </div>

                            <div class="col-lg-6">
                                <label class="form-label">Usuario</label>
                                <input type="text" class="form-control" id="registro_input_usuario"
                                    placeholder="Ingrese su usuario">
                            </div>

                            <div class="col-lg-6">
                                <div class="mb-3">
                                    <label class="form-label">Correo</label>
                                    <input type="text" class="form-control" id="registro_input_correo"
                                        placeholder="Ingrese su correo">
                                </div>
                            </div>

                            <div class="col-lg-6">
                                <div class="mb-3">
                                    <label class="form-label">Contraseña</label>
                                    <input type="password" class="form-control" id="registro_input_pass1"
                                        placeholder="Ingrese su contraseña">
                                </div>
                            </div>

                            <div class="col-lg-6">
                                <div class="mb-3">
                                    <label class="form-label">Confirmar Contraseña</label>
                                    <input type="password" class="form-control" id="registro_input_pass2"
                                        placeholder="Ingrese su contraseña">
                                </div>
                            </div>

                            <div class="col-lg-6">
                                <div class="mb-3">
                                    <label class="form-label">Fecha de nacimiento</label>
                                    <input type="date" class="form-control" id="registro_input_nacimiento"
                                        placeholder="Ingrese su fecha de nacimiento">
                                </div>
                            </div>

                            <div class="col-lg-6">
                                <div class="mb-3">
                                    <label class="form-label">Dirección de Despacho</label>
                                    <input type="text" class="form-control" id="registro_input_direccion"
                                        placeholder="Ingrese su dirección">
                                </div>
                            </div>

                        </div>

                        <div class="d-grid gap-2 col-6 mx-auto my-2">
                            <button class="btn btn-primary" type="button" id="btn_registro">Registrarse</button>
                        </div>

                    </div>
                </div>

                <div class="mt-2">
                    <a href="./login.html">Ya tengo una cuenta</a>
                    <div class="float-end">
                            <button id="btn_limpiar_form" type="button" class="btn btn-secondary btn-sm">Limpiar Formulario</button>

                    </div>
                </div>
            </div>
        </div>
    </main>


    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/js/bootstrap.bundle.min.js"

    <script src="../js/registro.js"></script>
